<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />

  <!-- AWS Cloud -->
  <rect x="50" y="50" width="700" height="500" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2" />
  <text x="70" y="80" font-family="sans-serif" font-weight="bold" fill="#0f172a">AWS Cloud</text>

  <!-- VPC -->
  <rect x="80" y="100" width="640" height="420" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" />
  <text x="100" y="130" font-family="sans-serif" font-weight="bold" fill="#475569">VPC</text>

  <!-- Public Subnet -->
  <rect x="110" y="150" width="580" height="120" rx="6" fill="#e2e8f0" stroke="#cbd5e1" />
  <text x="130" y="175" font-family="sans-serif" font-size="12" fill="#64748b">Public Subnet</text>

  <!-- Private Subnet -->
  <rect x="110" y="300" width="580" height="200" rx="6" fill="#e2e8f0" stroke="#cbd5e1" />
  <text x="130" y="325" font-family="sans-serif" font-size="12" fill="#64748b">Private Subnet</text>

  <!-- Components -->
  
  <!-- Internet Gateway -->
  <g transform="translate(360, 10)">
     <circle cx="40" cy="20" r="20" fill="#2563eb" />
     <text x="40" y="25" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">Internet</text>
  </g>

  <!-- ALB -->
  <g transform="translate(350, 190)">
    <rect x="0" y="0" width="100" height="60" rx="4" fill="#8b5cf6" filter="url(#shadow)" />
    <text x="50" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">ALB</text>
  </g>

  <!-- Fargate Tasks -->
  <g transform="translate(200, 360)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#f59e0b" filter="url(#shadow)" />
    <text x="60" y="45" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">Django Task 1</text>
  </g>

  <g transform="translate(480, 360)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#f59e0b" filter="url(#shadow)" />
    <text x="60" y="45" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">Django Task 2</text>
  </g>

  <!-- RDS -->
  <g transform="translate(340, 530)">
    <path d="M0,10 A60,10 0 0,0 120,10 A60,10 0 0,0 0,10 L0,50 A60,10 0 0,0 120,50 L120,10 Z" fill="#3b82f6" filter="url(#shadow)" />
    <text x="60" y="40" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">RDS (Postgres)</text>
  </g>

  <!-- Connections -->
  <!-- Internet to ALB -->
  <line x1="400" y1="50" x2="400" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- ALB to Tasks -->
  <path d="M400,250 L400,320 L260,320 L260,350" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M400,250 L400,320 L540,320 L540,350" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Tasks to RDS -->
  <path d="M260,440 L260,480 L380,480 L380,520" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M540,440 L540,480 L420,480 L420,520" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />

</svg>
