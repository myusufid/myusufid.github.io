    <script src="/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const encryptBtn = document.getElementById('encryptBtn');
            const decryptBtn = document.getElementById('decryptBtn');

            function getEncodingConfig(modeId, paddingId, ivId) {
                const modeStr = document.getElementById(modeId).value;
                const padStr = document.getElementById(paddingId).value;
                const ivStr = document.getElementById(ivId).value;

                let cfg = {
                    mode: CryptoJS.mode[modeStr],
                    padding: CryptoJS.pad[padStr],
                };

                if (ivStr) {
                    cfg.iv = CryptoJS.enc.Utf8.parse(ivStr);
                }

                return cfg;
            }

            // Encrypt Action
            encryptBtn.addEventListener('click', () => {
                const text = document.getElementById('encText').value;
                const keyStr = document.getElementById('encKey').value;
                const outFormat = document.querySelector('input[name="encFormat"]:checked').value;
                const encOutput = document.getElementById('encOutput');
                const encStatus = document.getElementById('encStatus');

                encStatus.textContent = '';

                if (!text || !keyStr) {
                    encStatus.textContent = 'Error: Text and Secret Key are required.';
                    encStatus.className = 'text-sm text-red-500 min-h-[20px]';
                    return;
                }

                try {
                    const key = CryptoJS.enc.Utf8.parse(keyStr);
                    const cfg = getEncodingConfig('encMode', 'encPadding', 'encIv');

                    const encrypted = CryptoJS.AES.encrypt(text, key, cfg);

                    if (outFormat === 'hex') {
                        encOutput.value = encrypted.ciphertext.toString(CryptoJS.enc.Hex);
                    } else {
                        encOutput.value = encrypted.toString(); // Default is base64
                    }

                    encStatus.textContent = 'Encrypted successfully';
                    encStatus.className = 'text-sm text-green-500 min-h-[20px]';
                } catch (err) {
                    encOutput.value = '';
                    encStatus.textContent = 'Error: ' + err.message;
                    encStatus.className = 'text-sm text-red-500 min-h-[20px]';
                }
            });

            // Decrypt Action
            decryptBtn.addEventListener('click', () => {
                const text = document.getElementById('decText').value.trim();
                const keyStr = document.getElementById('decKey').value;
                const outFormat = document.querySelector('input[name="decFormat"]:checked').value;
                const decOutput = document.getElementById('decOutput');
                const decStatus = document.getElementById('decStatus');

                decStatus.textContent = '';

                if (!text || !keyStr) {
                    decStatus.textContent = 'Error: Encrypted Text and Secret Key are required.';
                    decStatus.className = 'text-sm text-red-500 min-h-[20px]';
                    return;
                }

                try {
                    const key = CryptoJS.enc.Utf8.parse(keyStr);
                    const cfg = getEncodingConfig('decMode', 'decPadding', 'decIv');

                    // CryptoJS expects base64 formatting, or a CipherParams object with ciphertext encoded in Hex words. 
                    // Let's format manually if user gave HEX
                    let cipherTextStr = text;
                    const isHex = /^[0-9A-Fa-f]+$/.test(text);

                    // If text is fully hex, we construct CipherParams explicitly
                    let cipherParams;
                    if (isHex && text.length % 2 === 0 && !text.includes('=')) {
                        cipherParams = CryptoJS.lib.CipherParams.create({
                            ciphertext: CryptoJS.enc.Hex.parse(text)
                        });
                    } else {
                        // Assuming Base64
                        cipherParams = text;
                    }

                    const decrypted = CryptoJS.AES.decrypt(cipherParams, key, cfg);

                    if (outFormat === 'plaintext') {
                        const str = decrypted.toString(CryptoJS.enc.Utf8);
                        if (!str) throw new Error("Malformed UTF-8 data (incorrect key or padding?)");
                        decOutput.value = str;
                    } else {
                        decOutput.value = decrypted.toString(CryptoJS.enc.Base64);
                    }

                    decStatus.textContent = 'Decrypted successfully';
                    decStatus.className = 'text-sm text-green-500 min-h-[20px]';
                } catch (err) {
                    decOutput.value = '';
                    decStatus.textContent = 'Error: ' + err.message;
                    decStatus.className = 'text-sm text-red-500 min-h-[20px]';
                }
            });
        });
    </script>
