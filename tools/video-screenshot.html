    <script src="/script.js"></script>
    <script>
        // DOM Elements
        const uploadContainer = document.getElementById('uploadContainer');
        const videoInput = document.getElementById('videoInput');
        const videoContainer = document.getElementById('videoContainer');
        const videoPlayer = document.getElementById('videoPlayer');
        const progressBar = document.getElementById('progressBar');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const timeDisplay = document.getElementById('timeDisplay');
        const replaceBtn = document.getElementById('replaceBtn');
        const captureBtn = document.getElementById('captureBtn');
        const galleryContainer = document.getElementById('galleryContainer');
        const galleryGrid = document.getElementById('galleryGrid');

        // State
        let videoDuration = 0;

        // format time
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Handle File Upload
        uploadContainer.addEventListener('click', () => videoInput.click());

        uploadContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadContainer.classList.add('bg-muted/50');
        });

        uploadContainer.addEventListener('dragleave', () => {
            uploadContainer.classList.remove('bg-muted/50');
        });

        uploadContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadContainer.classList.remove('bg-muted/50');
            if (e.dataTransfer.files.length) {
                handleVideoFile(e.dataTransfer.files[0]);
            }
        });

        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleVideoFile(e.target.files[0]);
            }
        });

        function handleVideoFile(file) {
            if (!file.type.startsWith('video/')) {
                alert('Please upload a valid video file.');
                return;
            }

            const url = URL.createObjectURL(file);
            videoPlayer.src = url;

            // Switch view
            uploadContainer.classList.add('hidden');
            videoContainer.classList.remove('hidden');

            // Auto play is nice but maybe valid to pause
            videoPlayer.play().catch(() => { });
            updatePlayPauseIcon(true);
        }

        // Video Controls
        function updatePlayPauseIcon(isPlaying) {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        playPauseBtn.addEventListener('click', () => {
            if (videoPlayer.paused) {
                videoPlayer.play();
                updatePlayPauseIcon(true);
            } else {
                videoPlayer.pause();
                updatePlayPauseIcon(false);
            }
        });

        replaceBtn.addEventListener('click', () => {
            videoPlayer.pause();
            videoPlayer.src = '';
            videoInput.value = '';
            videoContainer.classList.add('hidden');
            uploadContainer.classList.remove('hidden');
            updatePlayPauseIcon(false);
        });

        // Time Update & Seeking
        videoPlayer.addEventListener('loadedmetadata', () => {
            videoDuration = videoPlayer.duration;
            progressBar.max = videoDuration;
            timeDisplay.textContent = `00:00 / ${formatTime(videoDuration)}`;
        });

        videoPlayer.addEventListener('timeupdate', () => {
            if (!videoPlayer.paused) { // only update if not dragging (simple check)
                progressBar.value = videoPlayer.currentTime;
                timeDisplay.textContent = `${formatTime(videoPlayer.currentTime)} / ${formatTime(videoDuration)}`;
            }
        });

        videoPlayer.addEventListener('ended', () => {
            updatePlayPauseIcon(false);
        });

        progressBar.addEventListener('input', () => {
            videoPlayer.currentTime = progressBar.value;
            timeDisplay.textContent = `${formatTime(progressBar.value)} / ${formatTime(videoDuration)}`;
        });

        // Capture Screenshot
        captureBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = videoPlayer.videoWidth;
            canvas.height = videoPlayer.videoHeight;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);

            try {
                const dataUrl = canvas.toDataURL('image/png');
                addScreenshotToGallery(dataUrl);
            } catch (e) {
                console.error("Screenshot failed", e);
                alert("Could not capture screenshot. This might be due to video format restrictions.");
            }
        });

        function addScreenshotToGallery(dataUrl) {
            galleryContainer.classList.remove('hidden');

            const id = Date.now();
            const filename = `screenshot-${id}.png`;

            const card = document.createElement('div');
            card.className = "group relative rounded-lg overflow-hidden border bg-card shadow-sm";
            card.innerHTML = `
                <div class="aspect-video w-full bg-black/5">
                    <img src="${dataUrl}" class="w-full h-full object-contain" alt="Screenshot">
                </div>
                <div class="p-3 flex items-center justify-between">
                    <span class="text-xs text-muted-foreground font-mono">PNG • ${videoPlayer.videoWidth}x${videoPlayer.videoHeight}</span>
                    <a href="${dataUrl}" download="${filename}" class="inline-flex items-center justify-center rounded-md text-xs font-medium bg-secondary text-secondary-foreground hover:bg-secondary/80 h-8 px-3 transition-colors">
                        Download
                    </a>
                </div>
            `;

            // Insert at the beginning
            galleryGrid.insertBefore(card, galleryGrid.firstChild);
        }
    </script>
