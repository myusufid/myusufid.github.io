    <main class="container mx-auto py-10 px-4 max-w-2xl">

        <div class="rounded-xl border bg-card text-card-foreground shadow-sm">
            <div class="p-6 space-y-6">
                <!-- Result Display -->
                <div class="flex items-center space-x-2">
                    <input type="text" id="passwordResult" readonly
                        class="flex h-12 w-full rouded-md border border-input bg-muted px-3 py-2 text-lg font-mono ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 text-center"
                        placeholder="Click Generate">
                    <button id="copyBtn"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-12 w-12"
                        title="Copy to clipboard">

                        </svg>
                    </button>
                    <button id="refreshBtn"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-12 px-4">
                        Generate
                    </button>
                </div>

                <!-- Controls -->
                <div class="space-y-4 pt-4 border-t">
                    <!-- Length Slider -->
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <label
                                class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Length</label>
                            <span id="lengthVal"
                                class="text-sm font-mono bg-secondary px-2 py-0.5 rounded text-secondary-foreground">16</span>
                        </div>
                        <input type="range" id="lengthSlider" min="8" max="64" value="16"
                            class="w-full h-2 bg-secondary rounded-lg appearance-none cursor-pointer accent-primary">
                    </div>

                    <!-- Options Checkboxes -->

                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">

                                class="h-4 w-4 rounded border-primary text-primary shadow focus:ring-primary accent-primary">
                            <span class="text-sm font-medium">Lowercase (a-z)</span>

                        <label class="flex items-center space-x-2 cursor-pointer">

                                class="h-4 w-4 rounded border-primary text-primary shadow focus:ring-primary accent-primary">

    <script src="/script.js"></script>
    <script>
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const passwordResult = document.getElementById('passwordResult');
        const copyBtn = document.getElementById('copyBtn');
        const refreshBtn = document.getElementById('refreshBtn');

        const uppercase = document.getElementById('uppercase');
        const lowercase = document.getElementById('lowercase');
        const numbers = document.getElementById('numbers');
        const symbols = document.getElementById('symbols');

        const upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lowerChars = 'abcdefghijklmnopqrstuvwxyz';
        const numberChars = '0123456789';
        const symbolChars = '!@#$%^&*()_+~`|}{[]\:;?><,./-=';

        function generatePassword() {
            let chars = '';
            if (uppercase.checked) chars += upperChars;
            if (lowercase.checked) chars += lowerChars;
            if (numbers.checked) chars += numberChars;
            if (symbols.checked) chars += symbolChars;

            if (chars === '') {
                passwordResult.value = 'Select at least one option';
                return;
            }

            let password = '';
            const length = lengthSlider.value;
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            passwordResult.value = password;
        }

        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
            generatePassword();
        });

        [uppercase, lowercase, numbers, symbols].forEach(el => {
            el.addEventListener('change', generatePassword);
        });

        refreshBtn.addEventListener('click', generatePassword);

        copyBtn.addEventListener('click', () => {
            if (passwordResult.value && passwordResult.value !== 'Select at least one option') {
                navigator.clipboard.writeText(passwordResult.value);
                const originalHtml = copyBtn.innerHTML;
                copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 text-green-500"><polyline points="20 6 9 17 4 12"/></svg>';
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                }, 1500);
            }
        });

        // Initial generation
        generatePassword();

    </script>
