    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputStr = document.getElementById('inputStr');
            const outputStr = document.getElementById('outputStr');
            const encodeBtn = document.getElementById('encodeBtn');
            const decodeBtn = document.getElementById('decodeBtn');
            const copyBtn = document.getElementById('copyBtn');
            const statusMsg = document.getElementById('statusMsg');

            function showStatus(msg, isError = false) {
                statusMsg.textContent = msg;
                statusMsg.className = isError ? "text-sm text-red-500" : "text-sm text-green-500";
                if (!isError) {
                    setTimeout(() => {
                        if (statusMsg.textContent === msg) {
                            statusMsg.textContent = '';
                        }
                    }, 3000);
                }
            }

            // UTF-8 aware encode/decode
            function b64EncodeUnicode(str) {
                return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
                    function toSolidBytes(match, p1) {
                        return String.fromCharCode('0x' + p1);
                    }));
            }

            function b64DecodeUnicode(str) {
                return decodeURIComponent(atob(str).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            }

            encodeBtn.addEventListener('click', () => {
                try {
                    const text = inputStr.value;
                    if (!text) {
                        outputStr.value = '';
                        return;
                    }
                    outputStr.value = b64EncodeUnicode(text);
                    showStatus('Encoded successfully.');
                } catch (e) {
                    outputStr.value = '';
                    showStatus('Error: Failed to encode text.', true);
                }
            });

            decodeBtn.addEventListener('click', () => {
                try {
                    let text = inputStr.value.trim();
                    if (!text) {
                        outputStr.value = '';
                        return;
                    }
                    // Optional: trim whitespace
                    outputStr.value = b64DecodeUnicode(text);
                    showStatus('Decoded successfully.');
                } catch (e) {
                    outputStr.value = '';
                    showStatus('Error: Invalid Base64 string.', true);
                }
            });

            copyBtn.addEventListener('click', () => {
                if (!outputStr.value) return;
                navigator.clipboard.writeText(outputStr.value);
                showStatus('Copied to clipboard!');
            });
        });
    </script>
