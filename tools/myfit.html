            { singular: 'glass of Es Teh Manis', plural: 'glasses of Es Teh Manis', calories: 80, iconUrl: '/tools/myfit-images/es-teh-manis.png' },

            { singular: 'pack of Kerupuk Udang', plural: 'packs of Kerupuk Udang', calories: 110, iconUrl: '/tools/myfit-images/kerupuk-udang.png' },
            { singular: 'plate of Gado-Gado', plural: 'plates of Gado-Gado', calories: 290, iconUrl: '/tools/myfit-images/gado-gado.png' },
        ];

        function getFoodEquivalent(calories) {
            let eligibleFoods = equivalentFoods.filter(food => food.calories <= calories);
            let selectedFood;
            if (eligibleFoods.length > 0) {
                selectedFood = eligibleFoods[Math.floor(Math.random() * eligibleFoods.length)];
            } else {
                selectedFood = equivalentFoods.reduce((prev, curr) => prev.calories < curr.calories ? prev : curr);
            }
            const quantity = Math.round(calories / selectedFood.calories);
            return { food: selectedFood, quantity };
        }

        // ─── Roasting Messages ────────────────────────────────────────────────────
        const roastingMessages = [
            { threshold: 0, message: "Did you even get off the couch? That's a pre-warm-up!" },
            { threshold: 0, message: "Zero effort detected. Did you blink and call it exercise?" },
            { threshold: 0, message: "I've seen sloths move with more intensity!" },
            { threshold: 25, message: "Finally! A pulse of activity. Baby steps, I guess." },
            { threshold: 25, message: "Is this a warm-up for your warm-up?" },
            { threshold: 50, message: "Barely a flicker! Is that all you've got?" },
            { threshold: 50, message: "My grandmother burns more calories knitting!" },
            { threshold: 75, message: "Okay, I see you trying. Emphasis on 'trying'." },
            { threshold: 75, message: "Getting warmer! Like lukewarm tea." },
            { threshold: 100, message: "A gentle simmer. Let's see some real heat!" },

            { threshold: 200, message: "Two hundred! You're practically an athlete now!" },
            { threshold: 250, message: "Feeling the burn yet? Or is that just indigestion?" },
            { threshold: 250, message: "Quarter of a thousand! Mathematical magic!" },
            { threshold: 300, message: "Picking up the pace! Still, not exactly an inferno." },
            { threshold: 300, message: "Three hundred! The fat is officially concerned!" },
            { threshold: 350, message: "Decent effort. Your sweat is almost visible!" },
            { threshold: 350, message: "You're burning! Like a controlled campfire!" },
            { threshold: 400, message: "Getting there! The calories are starting to feel the heat." },
            { threshold: 400, message: "Four hundred! You're a calorie-burning machine!" },
            { threshold: 450, message: "Halfway to a real workout! Don't stop now, you're almost roasted!" },
            { threshold: 450, message: "You're on fire! The calories are toast!" },
            { threshold: 500, message: "Now we're talking! The fat cells are crying for mercy." },
            { threshold: 500, message: "Five hundred! You've reached legend status!" },
            { threshold: 550, message: "Impressive! You're officially in the calorie-scorching zone." },
            { threshold: 600, message: "Burning bright! Are you sure you're not a dragon?" },
            { threshold: 650, message: "Unleashing the beast! The calories don't stand a chance." },
            { threshold: 700, message: "On fire! You're a human furnace, keep it up!" },
            { threshold: 750, message: "Seriously hot! The gym floor is probably melting." },
            { threshold: 800, message: "Incinerating calories! You're a force of nature." },
            { threshold: 850, message: "Beyond roasted! You're practically charcoal, in a good way!" },
            { threshold: 900, message: "Legendary burn! The calories are running in fear." },
            { threshold: 950, message: "Absolute inferno! You've annihilated those calories. Bow down!" },
            { threshold: 1000, message: "ONE THOUSAND! You've become the workout itself!" },
            { threshold: 1500, message: "FIFTEEN HUNDRED! You ARE the workout revolution!" },
        ];

        function getRandomRoastingMessage(calories) {
            const eligible = roastingMessages.filter(msg => msg.threshold <= calories);
            if (eligible.length > 0) {
                return eligible[Math.floor(Math.random() * eligible.length)].message;
            }
            return "Still waiting for the spark...";
        }

        // ─── Canvas Utilities ─────────────────────────────────────────────────────
        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            for (let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                if (context.measureText(testLine).width > maxWidth && n > 0) {
                    context.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            context.fillText(line, x, y);
        }

        function getResponsiveFontSize(context, text, maxWidth) {
            let fontSize = 120;
            context.font = `bold ${fontSize}px Poppins`;
            while (context.measureText(text).width > maxWidth) {
                fontSize--;
                context.font = `bold ${fontSize}px Poppins`;
            }
            return fontSize;
        }

        function parseTime(timeString) {
            const parts = timeString.split(':');
            return (parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60) + parseInt(parts[2], 10);
        }

        function formatPace(paceInSeconds) {
            const minutes = Math.floor(paceInSeconds / 60);
            const seconds = Math.round(paceInSeconds % 60);
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // ─── DOM References ───────────────────────────────────────────────────────
        const templateSelect = document.getElementById('template-select');
        const feInputs = document.getElementById('food-equivalent-inputs');
        const asInputs = document.getElementById('activity-stats-inputs');
        const csInputs = document.getElementById('custom-stats-inputs');
        const generateBtn = document.getElementById('generate-btn');
        const errorMsg = document.getElementById('error-msg');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasPlaceholder = document.getElementById('canvas-placeholder');
        const downloadBtn = document.getElementById('download-btn');

        // ─── Template Switching ───────────────────────────────────────────────────
        templateSelect.addEventListener('change', () => {
            feInputs.classList.add('hidden');
            asInputs.classList.add('hidden');
            csInputs.classList.add('hidden');
            const v = templateSelect.value;
            if (v === 'food-equivalent') feInputs.classList.remove('hidden');
            else if (v === 'visual-card') feInputs.classList.remove('hidden'); // reuses same inputs
            else if (v === 'activity-stats') asInputs.classList.remove('hidden');
            else if (v === 'custom-stats') csInputs.classList.remove('hidden');
            hideOutput();
        });

        function hideOutput() {
            canvas.classList.add('hidden');
            canvasPlaceholder.classList.remove('hidden');
            downloadBtn.classList.add('hidden');
            errorMsg.classList.add('hidden');
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function finalizeCanvas() {
            canvasPlaceholder.classList.add('hidden');
            canvas.classList.remove('hidden');
            downloadBtn.href = canvas.toDataURL('image/png');
            downloadBtn.classList.remove('hidden');
        }

        // ─── Image Generators ─────────────────────────────────────────────────────

        function generateFoodEquivalentImage(calories, km, steps) {
            const { food: selectedFood, quantity } = getFoodEquivalent(calories);

            const icon = new Image();
            icon.crossOrigin = 'anonymous';
            icon.src = selectedFood.iconUrl;

            icon.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Background
                ctx.fillStyle = '#282c34';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Food icon
                ctx.drawImage(icon, canvas.width / 2 - 150, 100, 300, 300);

                // Calories headline
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 72px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText(`You burned ${calories} calories!`, canvas.width / 2, 500);

                // Roasting message
                const roastingMessage = getRandomRoastingMessage(calories);
                ctx.font = 'italic 36px Poppins';
                ctx.fillStyle = '#FFD700';
                wrapText(ctx, roastingMessage, canvas.width / 2, 560, 1000, 40);

                // Food equivalent
                ctx.font = '54px Poppins';
                ctx.fillStyle = '#61dafb';
                const foodText = quantity === 1
                    ? `That's equivalent to about 1 ${selectedFood.singular}.`
                    : `That's equivalent to about ${quantity} ${selectedFood.plural}.`;
                wrapText(ctx, foodText, canvas.width / 2, 640, 1000, 60);

                // Stats
                ctx.font = '48px Poppins';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(`Kilometers: ${km} km`, canvas.width / 2, 780);
                ctx.fillText(`Steps: ${steps}`, canvas.width / 2, 880);

                finalizeCanvas();
            };

            icon.onerror = () => {
                // Fallback: draw without image
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#282c34';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 72px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText(`You burned ${calories} calories!`, canvas.width / 2, 300);

                const roastingMessage = getRandomRoastingMessage(calories);
                ctx.font = 'italic 36px Poppins';
                ctx.fillStyle = '#FFD700';
                wrapText(ctx, roastingMessage, canvas.width / 2, 380, 1000, 40);

                ctx.font = '54px Poppins';
                ctx.fillStyle = '#61dafb';
                const foodText = quantity === 1
                    ? `That's equivalent to about 1 ${selectedFood.singular}.`
                    : `That's equivalent to about ${quantity} ${selectedFood.plural}.`;
                wrapText(ctx, foodText, canvas.width / 2, 500, 1000, 60);

                ctx.font = '48px Poppins';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(`Kilometers: ${km} km`, canvas.width / 2, 700);
                ctx.fillText(`Steps: ${steps}`, canvas.width / 2, 800);

                finalizeCanvas();
            };
        }

        function generateActivityStatsImage(distance, time) {
            const totalSeconds = parseTime(time);
            const pace = totalSeconds / distance;
            const formattedPace = formatPace(pace);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';

            const maxWidth = 1000;

            // Distance
            let valueFontSize = getResponsiveFontSize(ctx, `${distance.toFixed(2)} km`, maxWidth);
            ctx.font = `bold ${valueFontSize / 2}px Poppins`;
            ctx.fillText('Distance', canvas.width / 2, 150);
            ctx.font = `bold ${valueFontSize}px Poppins`;
            ctx.fillText(`${distance.toFixed(2)} km`, canvas.width / 2, 300);

            // Pace
            valueFontSize = getResponsiveFontSize(ctx, `${formattedPace} /km`, maxWidth);
            ctx.font = `bold ${valueFontSize / 2}px Poppins`;
            ctx.fillText('Pace', canvas.width / 2, 450);
            ctx.font = `bold ${valueFontSize}px Poppins`;
            ctx.fillText(`${formattedPace} /km`, canvas.width / 2, 600);

            // Time
            valueFontSize = getResponsiveFontSize(ctx, time, maxWidth);
            ctx.font = `bold ${valueFontSize / 2}px Poppins`;
            ctx.fillText('Time', canvas.width / 2, 750);
            ctx.font = `bold ${valueFontSize}px Poppins`;
            ctx.fillText(time, canvas.width / 2, 900);

            // Logo
            ctx.font = 'bold 40px Poppins';
            ctx.fillText('MyFit', canvas.width / 2, 1020);

            finalizeCanvas();
        }

        function generateCustomStatsImage(distance, time, steps, calories) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';

            const maxWidth = 1000;

            // Distance
            let valueFontSize = getResponsiveFontSize(ctx, `${distance.toFixed(2)} km`, maxWidth);
            ctx.font = `bold ${valueFontSize / 2}px Poppins`;
            ctx.fillText('Distance', canvas.width / 2, 100);
            ctx.font = `bold ${valueFontSize}px Poppins`;
            ctx.fillText(`${distance.toFixed(2)} km`, canvas.width / 2, 220);

            // Time
            valueFontSize = getResponsiveFontSize(ctx, time, maxWidth);
            ctx.font = `bold ${valueFontSize / 2}px Poppins`;
            ctx.fillText('Time', canvas.width / 2, 340);
            ctx.font = `bold ${valueFontSize}px Poppins`;
            ctx.fillText(time, canvas.width / 2, 460);

            // Steps
            valueFontSize = getResponsiveFontSize(ctx, String(steps), maxWidth);
            ctx.font = `bold ${valueFontSize / 2}px Poppins`;
            ctx.fillText('Steps', canvas.width / 2, 580);
            ctx.font = `bold ${valueFontSize}px Poppins`;
            ctx.fillText(String(steps), canvas.width / 2, 700);

            // Calories
            valueFontSize = getResponsiveFontSize(ctx, String(calories), maxWidth);
            ctx.font = `bold ${valueFontSize / 2}px Poppins`;
            ctx.fillText('Calories', canvas.width / 2, 820);
            ctx.font = `bold ${valueFontSize}px Poppins`;
            ctx.fillText(String(calories), canvas.width / 2, 940);

            finalizeCanvas();
        }

        // ─── Visual Card Generator ────────────────────────────────────────────────
        // Emoji food list (fallback when local images are not used)
        const EMOJI_FOODS = [
            // Indonesian
            { name: 'Nasi Goreng', emoji: '🍳', cal: 400 },
            { name: 'Bakso', emoji: '🍜', cal: 280 },
            { name: 'Mie Ayam', emoji: '🍜', cal: 350 },
            { name: 'Sate Ayam', emoji: '🍢', cal: 70 },
            { name: 'Pisang Goreng', emoji: '🍌', cal: 130 },
            { name: 'Martabak', emoji: '🥞', cal: 380 },
            { name: 'Tempe Goreng', emoji: '🧱', cal: 85 },
            { name: 'Gado-Gado', emoji: '🥗', cal: 290 },
            { name: 'Nasi Padang', emoji: '🍛', cal: 450 },
            { name: 'Indomie', emoji: '🍝', cal: 330 },
            { name: 'Ayam Geprek', emoji: '🍗', cal: 520 },
            { name: 'Bubur Ayam', emoji: '🍚', cal: 240 },
            { name: 'Kerupuk', emoji: '🧀', cal: 110 },
            { name: 'Es Teh Manis', emoji: '🍵', cal: 80 },
            { name: 'Kopi Susu', emoji: '☕', cal: 90 },
            // International
            { name: 'Banana', emoji: '🍌', cal: 105 },
            { name: 'Pizza slice', emoji: '🍕', cal: 285 },
            { name: 'Donut', emoji: '🍩', cal: 250 },
            { name: 'Burger', emoji: '🍔', cal: 550 },
            { name: 'Bowl of rice', emoji: '🍚', cal: 200 },
            { name: 'Can of soda', emoji: '🥤', cal: 150 },
            { name: 'Chocolate bar', emoji: '🍫', cal: 230 },
            { name: 'Apple', emoji: '🍎', cal: 95 },
            { name: 'Fried chicken', emoji: '🍗', cal: 400 },
            { name: 'Avocado toast', emoji: '🥑', cal: 300 },
            { name: 'Ice cream', emoji: '🍨', cal: 210 },
            { name: 'French fries', emoji: '🍟', cal: 365 },
            { name: 'Hot dog', emoji: '🌭', cal: 290 },
            { name: 'Taco', emoji: '🌮', cal: 170 },
            { name: 'Sushi roll', emoji: '🍣', cal: 45 },
        ];

        function getEmojiFoods(calories) {
            // Pick 3 foods with best-looking (non-trivial) quantities
            const scored = EMOJI_FOODS.map(f => ({
                ...f,
                count: (calories / f.cal).toFixed(1),
                score: Math.abs((calories / f.cal) - Math.round(calories / f.cal)),
            }));
            scored.sort((a, b) => a.score - b.score);
            return scored.slice(0, 3);
        }

        function drawRoundedRect(ctx, x, y, w, h, r, fill) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            if (fill) { ctx.fillStyle = fill; ctx.fill(); }
        }

        function drawStatCard(ctx, x, y, w, h, label, value, unit, accent) {
            drawRoundedRect(ctx, x, y, w, h, 18, 'rgba(255,255,255,0.10)');
            // accent bar at bottom
            drawRoundedRect(ctx, x + 16, y + h - 7, w - 32, 5, 3, accent);
            // label
            ctx.font = '500 22px Inter, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.textAlign = 'center';
            ctx.fillText(label.toUpperCase(), x + w / 2, y + 34);
            // value
            ctx.font = 'bold 52px Inter, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(value, x + w / 2, y + h / 2 + 14);
            // unit
            if (unit) {
                ctx.font = '500 22px Inter, sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.60)';
                ctx.fillText(unit, x + w / 2, y + h / 2 + 44);
            }
        }

        function generateVisualCardImage(calories, km, steps) {
            const W = 1080, H = 1080;
            canvas.width = W; canvas.height = H;

            // ── Background gradient ──
            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Decorative blobs
            ctx.beginPath(); ctx.arc(880, 160, 280, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,107,107,0.07)'; ctx.fill();
            ctx.beginPath(); ctx.arc(160, 880, 240, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(78,205,196,0.07)'; ctx.fill();

            // ── Header label ──
            ctx.font = '600 30px Inter, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            ctx.textAlign = 'center';
            ctx.fillText('🔥  CALORIES BURNED', W / 2, 100);

            // ── Hero calorie number ──
            ctx.font = 'bold 160px Inter, sans-serif';
            ctx.fillStyle = '#FF6B6B';
            ctx.fillText(Number(calories).toLocaleString('en-US'), W / 2, 260);

            ctx.font = '500 38px Inter, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.fillText('kcal', W / 2, 318);

            // ── Divider ──
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(80, 360); ctx.lineTo(W - 80, 360); ctx.stroke();

            // ── Stat cards row ──
            const cW = 280, cH = 155, cY = 390, gap = 20;
            const startX = (W - (cW * 3 + gap * 2)) / 2;
            drawStatCard(ctx, startX, cY, cW, cH, 'Distance', parseFloat(km).toFixed(2), 'km', '#4ECDC4');
            drawStatCard(ctx, startX + cW + gap, cY, cW, cH, 'Steps', Number(steps).toLocaleString('en-US'), 'steps', '#FFE66D');
            drawStatCard(ctx, startX + (cW + gap) * 2, cY, cW, cH, 'Calories', Number(calories).toLocaleString('en-US'), 'kcal', '#FF6B6B');

            // ── Equivalent to label ──
            ctx.font = '600 26px Inter, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.40)';
            ctx.textAlign = 'center';
            ctx.fillText('EQUIVALENT TO', W / 2, 610);

            // ── Emoji food cards ──
            const foods = getEmojiFoods(parseInt(calories));
            const fcW = 280, fcH = 200, fcY = 635;
            const fStartX = (W - (fcW * 3 + gap * 2)) / 2;
            const accents = ['#FF6B6B', '#FFE66D', '#4ECDC4'];

            foods.forEach((food, i) => {
                const fx = fStartX + i * (fcW + gap);
                drawRoundedRect(ctx, fx, fcY, fcW, fcH, 18, 'rgba(255,255,255,0.09)');
                // emoji
                ctx.font = '72px serif';
                ctx.textAlign = 'center';
                ctx.fillText(food.emoji, fx + fcW / 2, fcY + 82);
                // count
                ctx.font = 'bold 34px Inter, sans-serif';
                ctx.fillStyle = accents[i];
                ctx.fillText(`×${food.count}`, fx + fcW / 2, fcY + 130);
                // name
                ctx.font = '500 20px Inter, sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.60)';
                ctx.fillText(food.name, fx + fcW / 2, fcY + 162);
            });

            // ── Footer ──
            ctx.font = '400 24px Inter, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.textAlign = 'center';
            ctx.fillText('myusufid.github.io/tools/myfit', W / 2, H - 48);

            finalizeCanvas();
        }

        // ─── localStorage Persistence ─────────────────────────────────────────────
        const STORAGE_KEY = 'myfit_last_input';
        const saveIndicator = document.getElementById('save-indicator');

        // All tracked field IDs
        const FIELD_IDS = ['calories', 'km', 'steps', 'distance', 'time',
            'custom-distance', 'custom-time', 'custom-steps', 'custom-calories'];

        function saveState() {
            const state = { template: templateSelect.value, savedAt: Date.now() };
            FIELD_IDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) state[id] = el.value;
            });
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                const d = new Date();
                const hh = String(d.getHours()).padStart(2, '0');
                const mm = String(d.getMinutes()).padStart(2, '0');
                const ss = String(d.getSeconds()).padStart(2, '0');
                saveIndicator.textContent = `✓ Autosaved at ${hh}:${mm}:${ss}`;
            } catch (e) { /* storage unavailable */ }
        }

        function restoreState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const state = JSON.parse(raw);

                // Restore template
                if (state.template) {
                    templateSelect.value = state.template;
                    // Trigger panel visibility
                    feInputs.classList.add('hidden');
                    asInputs.classList.add('hidden');
                    csInputs.classList.add('hidden');
                    if (state.template === 'food-equivalent') feInputs.classList.remove('hidden');
                    else if (state.template === 'activity-stats') asInputs.classList.remove('hidden');
                    else if (state.template === 'custom-stats') csInputs.classList.remove('hidden');
                }

                // Restore field values
                FIELD_IDS.forEach(id => {
                    const el = document.getElementById(id);
                    if (el && state[id] !== undefined) el.value = state[id];
                });

                // Show when it was last saved
                if (state.savedAt) {
                    const d = new Date(state.savedAt);
                    const hh = String(d.getHours()).padStart(2, '0');
                    const mm = String(d.getMinutes()).padStart(2, '0');
                    const ss = String(d.getSeconds()).padStart(2, '0');
                    saveIndicator.textContent = `✓ Restored from ${hh}:${mm}:${ss}`;
                }
            } catch (e) { /* corrupted storage, ignore */ }
        }

        // Save on every field change
        FIELD_IDS.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', saveState);
        });
        templateSelect.addEventListener('change', saveState);

        // Restore on load — also fix panel visibility for visual-card
        restoreState();
        if (templateSelect.value === 'visual-card') feInputs.classList.remove('hidden');

        // ─── Generate Button ──────────────────────────────────────────────────────
        generateBtn.addEventListener('click', () => {
            errorMsg.classList.add('hidden');
            const tmpl = templateSelect.value;

            if (tmpl === 'food-equivalent') {
                const cal = parseInt(document.getElementById('calories').value);
                const km = document.getElementById('km').value;
                const steps = document.getElementById('steps').value;
                if (!cal || !km || !steps) { showError('Please fill in all fields.'); return; }
                generateFoodEquivalentImage(cal, km, steps);

            } else if (tmpl === 'visual-card') {
                const cal = parseInt(document.getElementById('calories').value);
                const km = document.getElementById('km').value;
                const steps = document.getElementById('steps').value;
                if (!cal || !km || !steps) { showError('Please fill in all fields.'); return; }
                generateVisualCardImage(cal, km, steps);

            } else if (tmpl === 'activity-stats') {
                const dist = parseFloat(document.getElementById('distance').value);
                const time = document.getElementById('time').value.trim();
                if (!dist || !time) { showError('Please fill in all fields.'); return; }
                if (!time.match(/^\d{1,2}:\d{2}:\d{2}$/)) { showError('Invalid time format. Use hh:mm:ss'); return; }
                generateActivityStatsImage(dist, time);

            } else if (tmpl === 'custom-stats') {
                const dist = parseFloat(document.getElementById('custom-distance').value);
                const time = document.getElementById('custom-time').value.trim();
                const steps = document.getElementById('custom-steps').value;
                const cal = document.getElementById('custom-calories').value;
                if (!dist || !time || !steps || !cal) { showError('Please fill in all fields.'); return; }
                if (!time.match(/^\d{1,2}:\d{2}:\d{2}$/)) { showError('Invalid time format. Use hh:mm:ss'); return; }
                generateCustomStatsImage(dist, time, steps, cal);
            }
        });
    </script>
