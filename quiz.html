<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz CPNS Tryout | M Yusuf</title>

    <link rel="icon" type="image/png" href="/assets/images/favicon_io/favicon-32x32.png">

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
                        secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
                        muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
                        accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
                        card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
                    },
                    borderRadius: { lg: "var(--radius)", md: "calc(var(--radius) - 2px)", sm: "calc(var(--radius) - 4px)" },
                },
            },
        }
    </script>
</head>

<body class="min-h-screen bg-background text-foreground antialiased transition-colors duration-300">
    <header
        class="sticky top-0 z-40 w-full border-b bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
        <div class="container mx-auto flex h-16 items-center justify-between px-4 max-w-5xl">
            <div class="flex items-center gap-4">
                <a href="/" class="flex flex-col">
                    <span class="text-lg font-bold tracking-tight">M YUSUF</span>
                    <span class="text-xs text-muted-foreground">Backend Developer</span>
                </a>
            </div>
            <nav class="flex items-center gap-6">
                <div class="flex items-center gap-4 text-sm font-medium">
                    <a href="/" class="transition-colors hover:text-foreground/80 text-foreground/60">Blog</a>
                    <a href="/tools/index.html" class="transition-colors hover:text-foreground/80 text-foreground/60">Tools</a>
                    <a href="/tags.html" class="transition-colors hover:text-foreground/80 text-foreground/60">Tags</a>
                    <a href="/about.html" class="transition-colors hover:text-foreground/80 text-foreground/60">About</a>
                    <a href="/quiz.html" class="transition-colors hover:text-foreground/80 text-foreground">Quiz</a>
                    <button id="themeToggle"
                        class="inline-flex items-center justify-center rounded-md w-9 h-9 border hover:bg-accent hover:text-accent-foreground">
                        <svg class="h-[1.2rem] w-[1.2rem] rotate-0 scale-100 transition-all dark:-rotate-90 dark:scale-0 dark-icon"
                            fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                        </svg>
                        <svg class="absolute h-[1.2rem] w-[1.2rem] rotate-90 scale-0 transition-all dark:rotate-0 dark:scale-100 light-icon"
                            fill="currentColor" viewBox="0 0 24 24">
                            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                        </svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container mx-auto py-10 px-4 max-w-3xl">

        <!-- SCREEN: Bank Selection -->
        <div id="screen-home">
            <div class="mb-8">
                <h1 class="text-3xl font-bold tracking-tight mb-2">CPNS Tryout</h1>
                <p class="text-muted-foreground">Pilih bank soal untuk memulai latihan.</p>
            </div>
            <div id="bank-list" class="grid gap-4 sm:grid-cols-2"></div>
        </div>

        <!-- SCREEN: Quiz -->
        <div id="screen-quiz" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <button id="btn-exit" class="text-sm text-muted-foreground hover:text-foreground transition-colors">← Kembali</button>
                <div id="quiz-progress" class="text-sm text-muted-foreground"></div>
            </div>

            <div class="mb-2">
                <div class="h-2 w-full bg-muted rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-primary transition-all duration-300" style="width:0%"></div>
                </div>
            </div>

            <div class="mt-8 mb-6">
                <span id="quiz-category" class="text-xs font-mono text-muted-foreground uppercase tracking-widest"></span>
                <p id="quiz-question" class="text-lg font-medium mt-2 leading-relaxed"></p>
            </div>

            <div id="quiz-options" class="grid gap-3 mb-8"></div>

            <button id="btn-next"
                class="w-full py-3 rounded-lg bg-primary text-primary-foreground font-medium disabled:opacity-40 disabled:cursor-not-allowed transition-opacity"
                disabled>
                Selanjutnya →
            </button>
        </div>

        <!-- SCREEN: Result -->
        <div id="screen-result" class="hidden text-center">
            <div class="mb-8">
                <div id="result-emoji" class="text-6xl mb-4"></div>
                <h2 class="text-2xl font-bold mb-1">Hasil Tryout</h2>
                <p id="result-bank-title" class="text-muted-foreground text-sm"></p>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="rounded-lg border p-4">
                    <div id="result-score" class="text-3xl font-bold text-primary"></div>
                    <div class="text-xs text-muted-foreground mt-1">Nilai</div>
                </div>
                <div class="rounded-lg border p-4">
                    <div id="result-correct" class="text-3xl font-bold"></div>
                    <div class="text-xs text-muted-foreground mt-1">Benar</div>
                </div>
                <div class="rounded-lg border p-4">
                    <div id="result-wrong" class="text-3xl font-bold"></div>
                    <div class="text-xs text-muted-foreground mt-1">Salah</div>
                </div>
            </div>

            <div id="result-status" class="mb-8 py-3 px-4 rounded-lg text-sm font-medium"></div>

            <!-- Review -->
            <div class="text-left mb-8">
                <h3 class="font-semibold mb-4">Pembahasan</h3>
                <div id="review-list" class="grid gap-4"></div>
            </div>

            <div class="flex gap-3">
                <button id="btn-retry"
                    class="flex-1 py-3 rounded-lg border hover:bg-accent transition-colors font-medium">
                    Ulangi
                </button>
                <button id="btn-home"
                    class="flex-1 py-3 rounded-lg bg-primary text-primary-foreground font-medium">
                    Bank Soal
                </button>
            </div>
        </div>

    </main>

    <footer class="border-t py-8 mt-auto">
        <div class="container mx-auto px-4 max-w-5xl flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm text-muted-foreground">© 2026 M Yusuf</p>
            <div class="flex items-center gap-4 text-muted-foreground">
                <a href="https://github.com/myusufid" target="_blank" class="hover:text-foreground">
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="/script.js"></script>
    <script>
        const PASS_SCORE = 70;

        let state = {
            banks: [],
            currentBank: null,
            questions: [],
            currentIndex: 0,
            answers: [],
            selected: null,
        };

        async function loadBankIndex() {
            const res = await fetch('/notes-cpns/bank-soal/index.json');
            const data = await res.json();
            state.banks = data.banks;
            renderHome();
        }

        function renderHome() {
            const list = document.getElementById('bank-list');
            list.innerHTML = state.banks.map(bank => `
                <div class="rounded-lg border p-5 hover:border-primary/50 transition-colors cursor-pointer group"
                     onclick="startQuiz('${bank.id}')">
                    <div class="flex items-start justify-between mb-3">
                        <span class="text-xs font-mono px-2 py-0.5 rounded-full border ${
                            bank.category === 'TWK' ? 'border-blue-500/30 text-blue-500' : 'border-orange-500/30 text-orange-500'
                        }">${bank.category}</span>
                        <span class="text-xs text-muted-foreground">${bank.total} soal</span>
                    </div>
                    <h3 class="font-semibold mb-1 group-hover:text-primary transition-colors">${bank.title}</h3>
                    <p class="text-sm text-muted-foreground">${bank.description}</p>
                    <div class="mt-4 text-xs font-medium text-primary opacity-0 group-hover:opacity-100 transition-opacity">
                        Mulai Tryout →
                    </div>
                </div>
            `).join('');
        }

        async function startQuiz(bankId) {
            const bank = state.banks.find(b => b.id === bankId);
            const res = await fetch(bank.file);
            const data = await res.json();

            state.currentBank = bank;
            state.questions = data.questions;
            state.currentIndex = 0;
            state.answers = new Array(data.questions.length).fill(null);
            state.selected = null;

            showScreen('quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.questions[state.currentIndex];
            const total = state.questions.length;
            const idx = state.currentIndex;

            document.getElementById('quiz-category').textContent = state.currentBank.category;
            document.getElementById('quiz-question').textContent = q.question;
            document.getElementById('quiz-progress').textContent = `${idx + 1} / ${total}`;
            document.getElementById('progress-bar').style.width = `${((idx + 1) / total) * 100}%`;

            state.selected = null;
            document.getElementById('btn-next').disabled = true;
            document.getElementById('btn-next').textContent = idx === total - 1 ? 'Lihat Hasil' : 'Selanjutnya →';

            const optionsEl = document.getElementById('quiz-options');
            optionsEl.innerHTML = Object.entries(q.options).map(([key, val]) => `
                <button
                    class="option-btn text-left w-full px-4 py-3 rounded-lg border text-sm transition-all hover:border-primary/60"
                    data-key="${key}"
                    onclick="selectOption('${key}')">
                    <span class="font-mono font-bold mr-2">${key}.</span>${val}
                </button>
            `).join('');
        }

        function selectOption(key) {
            state.selected = key;
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-primary/10');
                if (btn.dataset.key === key) {
                    btn.classList.add('border-primary', 'bg-primary/10');
                }
            });
            document.getElementById('btn-next').disabled = false;
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            state.answers[state.currentIndex] = state.selected;
            if (state.currentIndex < state.questions.length - 1) {
                state.currentIndex++;
                renderQuestion();
            } else {
                showResult();
            }
        });

        document.getElementById('btn-exit').addEventListener('click', () => showScreen('home'));
        document.getElementById('btn-home').addEventListener('click', () => showScreen('home'));
        document.getElementById('btn-retry').addEventListener('click', () => startQuiz(state.currentBank.id));

        function showResult() {
            showScreen('result');

            const questions = state.questions;
            const answers = state.answers;
            let correct = 0;

            questions.forEach((q, i) => {
                if (answers[i] === q.answer) correct++;
            });

            const wrong = questions.length - correct;
            const score = Math.round((correct / questions.length) * 100);
            const pass = score >= PASS_SCORE;

            document.getElementById('result-bank-title').textContent = state.currentBank.title;
            document.getElementById('result-score').textContent = score;
            document.getElementById('result-correct').textContent = correct;
            document.getElementById('result-wrong').textContent = wrong;
            document.getElementById('result-emoji').textContent = pass ? '🎉' : '📚';

            const statusEl = document.getElementById('result-status');
            if (pass) {
                statusEl.textContent = `Selamat! Nilai kamu ${score} — memenuhi ambang batas kelulusan (${PASS_SCORE}).`;
                statusEl.className = 'mb-8 py-3 px-4 rounded-lg text-sm font-medium bg-green-500/10 text-green-600 dark:text-green-400 border border-green-500/20';
            } else {
                statusEl.textContent = `Nilai kamu ${score} — di bawah ambang batas kelulusan (${PASS_SCORE}). Terus belajar!`;
                statusEl.className = 'mb-8 py-3 px-4 rounded-lg text-sm font-medium bg-red-500/10 text-red-600 dark:text-red-400 border border-red-500/20';
            }

            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = questions.map((q, i) => {
                const userAnswer = answers[i];
                const isCorrect = userAnswer === q.answer;
                return `
                    <div class="rounded-lg border p-4 ${isCorrect ? 'border-green-500/20' : 'border-red-500/20'}">
                        <div class="flex items-start gap-2 mb-3">
                            <span class="text-sm mt-0.5">${isCorrect ? '✅' : '❌'}</span>
                            <p class="text-sm font-medium leading-relaxed">${i + 1}. ${q.question}</p>
                        </div>
                        <div class="ml-6 space-y-1 text-sm">
                            ${userAnswer && !isCorrect ? `<p class="text-red-500 dark:text-red-400">Jawaban kamu: <strong>${userAnswer}. ${q.options[userAnswer]}</strong></p>` : ''}
                            <p class="text-green-600 dark:text-green-400">Jawaban benar: <strong>${q.answer}. ${q.options[q.answer]}</strong></p>
                            <p class="text-muted-foreground mt-2 text-xs leading-relaxed">${q.explanation}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showScreen(name) {
            ['home', 'quiz', 'result'].forEach(s => {
                document.getElementById(`screen-${s}`).classList.add('hidden');
            });
            document.getElementById(`screen-${name}`).classList.remove('hidden');
        }

        loadBankIndex();
    </script>
</body>

</html>
